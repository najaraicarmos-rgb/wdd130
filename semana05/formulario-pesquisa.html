<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Pesquisa</title>
    <link rel="stylesheet" href="estilos/formulario-pesquisa.css">
</head>
<body>

<header>
    <h1>Pesquisa de Opinião</h1>
</header>

<main>  
    <form>
        <div class="item-formulario coluna2">
            <label for="nome-completo">Nome Completo:</label>
            <input type="text" id="nome-completo" name="nome-completo" required>    
        </div>

        <div class="item-formulario coluna2">
            <label for="emaildousuario">Email do Usuário:</label>
            <input type="email" id="emaildousuario" name="emaildousuario" required>   
        </div>

        <div class="item-formulario coluna1">
            <label for="navegador">Qual seu navegador favorito?:</label>
            <select id="navegador" name="navegador">
                <option value="chrome">Chrome</option>
                <option value="safari">Safari</option>
                <option value="edge">Edge</option>  
                <option value="brave">Brave</option>
                <option value="outro">Outro</option>
            </select>
        </div>

        <div class="item-formulario coluna1">
            <label for="pet">Você tem um bichinho de estimação em casa?</label>
            <input type="checkbox" id="pet" name="pet">
        </div>

        <div class="item-formulario">
            <label for="feedback">Liste os lugares onde você morou.</label>
            <textarea id="feedback" name="feedback" rows="4" placeholder="Stillwater Flórida, Amsterdã Holanda, Tibuktu Mali"></textarea>
        </div>
        
        <button type="submit">Enviar Pesquisa</button>
    </form>
</main>

<footer>
    </footer>

</body>
</html>
